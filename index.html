<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Oh Card</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,400&family=Noto+Serif+TC:wght@300;400;500&display=swap');
:root{
  --bg:#eef2f7; --bg2:#e2eaf3;
  --navy:#1b3a5c; --navy2:#254d7a;
  --teal:#2a7c8a; --sand:#c8a96e; --sand2:#e8d5a8; --sand3:#fdf8ee;
  --ink:#1a2530; --muted:#6b8299; --red:#b83030; --white:#fff;
  --card-r:6px;
}
*{margin:0;padding:0;box-sizing:border-box;}
body{background:var(--bg);color:var(--ink);font-family:'Noto Serif TC',serif;min-height:100vh;overflow-x:hidden;}
body::before{content:'';position:fixed;inset:0;pointer-events:none;z-index:0;
  background:radial-gradient(ellipse at 15% 85%,rgba(27,58,92,.07) 0%,transparent 55%),
             radial-gradient(ellipse at 85% 10%,rgba(42,124,138,.06) 0%,transparent 55%);}

/* ── TOP BAR ── */
.top-bar{position:sticky;top:0;z-index:90;background:rgba(27,58,92,.97);backdrop-filter:blur(14px);
  padding:.55rem 1.2rem;display:flex;align-items:center;justify-content:space-between;gap:.6rem;
  box-shadow:0 2px 20px rgba(27,58,92,.35);}
.top-title{font-family:'Cormorant Garamond',serif;font-size:1.2rem;font-style:italic;color:var(--sand2);letter-spacing:.15em;}
.top-right{display:flex;gap:.45rem;align-items:center;flex-wrap:wrap;}
.btn{padding:.38rem 1rem;border-radius:4px;font-family:'Noto Serif TC',serif;font-size:.76rem;letter-spacing:.1em;cursor:pointer;transition:all .22s;border:none;white-space:nowrap;}
.btn-gold{background:linear-gradient(135deg,var(--sand) 0%,#b8902a 100%);color:var(--navy);font-weight:500;box-shadow:0 2px 8px rgba(200,169,110,.4);}
.btn-gold:hover:not(:disabled){filter:brightness(1.1);transform:translateY(-1px);}
.btn-gold:disabled{opacity:.35;cursor:not-allowed;transform:none;}
.btn-outline{background:transparent;color:var(--sand2);border:1px solid rgba(200,169,110,.35);}
.btn-outline:hover{background:rgba(200,169,110,.1);}
.btn-navy{background:var(--navy);color:var(--sand2);border:1px solid rgba(200,169,110,.2);}
.btn-navy:hover{background:var(--navy2);}
.pill{font-size:.66rem;letter-spacing:.1em;padding:.22rem .65rem;border-radius:20px;border:1px solid rgba(200,169,110,.3);color:var(--sand2);background:rgba(200,169,110,.08);}

/* ── QUESTION SCREEN ── */
.q-screen{position:relative;z-index:10;max-width:560px;margin:2.5rem auto 1.5rem;padding:0 1.2rem;}
.q-card{background:var(--white);border-radius:12px;padding:1.6rem 1.8rem;box-shadow:0 4px 24px rgba(27,58,92,.1);border:1px solid rgba(200,169,110,.2);}
.q-label{font-size:.75rem;color:var(--muted);letter-spacing:.2em;margin-bottom:.6rem;}
.q-row{display:flex;gap:.7rem;align-items:stretch;}
.q-prefix{font-size:.9rem;color:var(--navy);letter-spacing:.08em;font-weight:500;padding:.5rem 0;white-space:nowrap;align-self:center;}
.q-input{flex:1;border:1.5px solid rgba(27,58,92,.18);border-radius:6px;padding:.5rem .8rem;font-family:'Noto Serif TC',serif;font-size:.88rem;color:var(--ink);background:var(--bg);outline:none;transition:border-color .2s;}
.q-input:focus{border-color:var(--sand);}
.q-actions{display:flex;gap:.6rem;margin-top:1rem;justify-content:flex-end;}

/* ── RESULTS AREA ── */
.results-area{position:relative;z-index:5;padding:0 1rem .5rem;max-width:960px;margin:0 auto;display:none;}
.results-area.has-cards{display:block;}
.results-title{font-size:.7rem;color:var(--muted);letter-spacing:.2em;text-align:center;padding:.5rem 0 .6rem;}
.results-scroll{display:flex;gap:1rem;overflow-x:auto;padding:.3rem .2rem .8rem;scrollbar-width:thin;scrollbar-color:var(--sand) transparent;}
.result-group{flex-shrink:0;display:flex;flex-direction:column;align-items:center;gap:.3rem;
  background:var(--white);border-radius:10px;padding:.7rem .8rem;box-shadow:0 2px 12px rgba(27,58,92,.1);
  border:1px solid rgba(200,169,110,.18);min-width:120px;}
.rg-num{font-size:.58rem;color:var(--muted);letter-spacing:.15em;}
.rg-combo{position:relative;background:var(--white);border-radius:8px;padding:14px 12px 12px;
  border:1px solid rgba(200,169,110,.25);box-shadow:0 2px 8px rgba(0,0,0,.08);}
.rg-w{position:absolute;font-size:.5rem;color:var(--ink);letter-spacing:.06em;font-family:'Noto Serif TC',serif;}
.rg-w.t{top:3px;left:50%;transform:translateX(-50%);white-space:nowrap;}
.rg-w.b{bottom:3px;left:50%;transform:translateX(-50%);white-space:nowrap;}
.rg-w.l{left:2px;top:50%;transform:translateY(-50%);writing-mode:vertical-rl;font-size:.45rem;}
.rg-w.r{right:2px;top:50%;transform:translateY(-50%) rotate(180deg);writing-mode:vertical-rl;font-size:.45rem;}
.rg-img{width:52px;aspect-ratio:2/3;border-radius:3px;overflow:hidden;border:2px solid var(--red);}
.rg-img img{width:100%;height:100%;object-fit:contain;display:block;background:#fff;}

/* Download all btn */
.dl-all-wrap{text-align:center;padding:.2rem 0 .6rem;position:relative;z-index:10;}

/* ── DIVIDER ── */
.section-label{text-align:center;position:relative;z-index:5;pointer-events:none;font-family:'Cormorant Garamond',serif;font-size:.78rem;font-style:italic;letter-spacing:.25em;padding:.3rem 0 .1rem;}
.section-label.img-lbl{color:var(--teal);}
.section-label.word-lbl{color:var(--sand);}
.section-label .badge{font-size:.58rem;font-style:normal;margin-left:.4rem;}
.deck-divider{display:flex;align-items:center;justify-content:center;gap:.6rem;padding:.35rem 2rem;position:relative;z-index:10;}
.div-line{flex:1;height:1px;background:linear-gradient(to right,transparent,rgba(27,58,92,.18),transparent);}
.div-orn{color:var(--muted);font-size:.6rem;letter-spacing:.35em;}

/* ── FAN ── */
.fan-wrap{position:relative;z-index:10;width:100%;display:flex;justify-content:center;overflow:visible;padding-top:8px;}
.fan-container{position:relative;z-index:20;}
.fan-card{position:absolute;transform-origin:bottom center;cursor:pointer;transition:filter .18s;will-change:transform;}
.fan-card:not(.flipped):not(.disabled):hover{z-index:99!important;filter:brightness(1.18);}
.fan-card.disabled{cursor:not-allowed;}
.fan-card.disabled .card-back-face{opacity:.3;}

@keyframes pullFlip{
  0%  {transform:var(--bt) translateY(0) scale(1) rotateY(0deg);}
  25% {transform:var(--bt) translateY(-30px) scale(1.1) rotateY(0deg);}
  60% {transform:var(--bt) translateY(-18px) scale(1.06) rotateY(90deg);}
  100%{transform:var(--bt) translateY(0) scale(1) rotateY(180deg);}
}
.fan-card.flipping{animation:pullFlip .7s cubic-bezier(.4,0,.2,1) forwards;z-index:200!important;}
.fan-card.flipped .card-inner{width:100%;height:100%;transform-style:preserve-3d;border-radius:var(--card-r);position:relative;}
.card-face{position:absolute;inset:0;border-radius:var(--card-r);backface-visibility:hidden;-webkit-backface-visibility:hidden;overflow:hidden;}

/* Backs */
.img-back{background:linear-gradient(160deg,var(--navy2) 0%,var(--navy) 100%);border:1px solid rgba(200,169,110,.25);display:flex;align-items:center;justify-content:center;box-shadow:0 3px 10px rgba(27,58,92,.4);}
.img-back-inner{width:74%;height:80%;border:1px solid rgba(200,169,110,.18);border-radius:3px;display:flex;align-items:center;justify-content:center;background:repeating-linear-gradient(45deg,transparent,transparent 4px,rgba(200,169,110,.04) 4px,rgba(200,169,110,.05) 5px);}
.word-back{background:linear-gradient(160deg,#b8902a 0%,var(--sand) 60%,#a07828 100%);border:1px solid rgba(255,255,255,.15);display:flex;align-items:center;justify-content:center;box-shadow:0 3px 10px rgba(180,140,40,.3);}
.word-back-inner{width:74%;height:80%;border:1px solid rgba(255,255,255,.18);border-radius:3px;display:flex;align-items:center;justify-content:center;background:repeating-linear-gradient(45deg,transparent,transparent 4px,rgba(255,255,255,.05) 4px,rgba(255,255,255,.06) 5px);}
.back-glyph{font-size:.75rem;color:rgba(255,255,255,.22);font-family:'Cormorant Garamond',serif;font-style:italic;}
.fan-card:not(.flipped):not(.disabled):hover .img-back{box-shadow:0 0 18px rgba(200,169,110,.28),inset 0 0 0 1px rgba(200,169,110,.22);}
.fan-card:not(.flipped):not(.disabled):hover .word-back{box-shadow:0 0 18px rgba(200,169,110,.38),inset 0 0 0 1px rgba(255,255,255,.22);}

/* Fronts */
.card-front{transform:rotateY(180deg);background:var(--white);border:1.5px solid var(--sand);box-shadow:0 3px 12px rgba(27,58,92,.15);}
.card-front img{width:100%;height:100%;object-fit:contain;display:block;background:var(--white);}
.card-front.word-face{background:var(--sand3);border-color:var(--sand);display:flex;align-items:center;justify-content:center;}
.word-glyph{font-family:'Noto Serif TC',serif;font-size:clamp(.48rem,1.6vw,.82rem);color:var(--ink);text-align:center;letter-spacing:.06em;}

/* ── SHUFFLE ANIMATION ── */
@keyframes shuffleLeft {0%{transform:translateX(0) rotate(0);}30%{transform:translateX(-18px) rotate(-8deg);}70%{transform:translateX(8px) rotate(3deg);}100%{transform:translateX(0) rotate(0);}}
@keyframes shuffleRight{0%{transform:translateX(0) rotate(0);}30%{transform:translateX(18px) rotate(8deg);}70%{transform:translateX(-8px) rotate(-3deg);}100%{transform:translateX(0) rotate(0);}}
.shuffling-l{animation:shuffleLeft .5s ease-in-out;}
.shuffling-r{animation:shuffleRight .5s ease-in-out;}

/* ── OVERLAY ── */
.overlay{display:none;position:fixed;inset:0;z-index:300;align-items:center;justify-content:center;flex-direction:column;gap:.9rem;padding:1.2rem;}
.overlay.show{display:flex;}
.overlay-bg{position:absolute;inset:0;background:rgba(12,20,32,.9);backdrop-filter:blur(8px);}
.ov-content{position:relative;z-index:1;display:flex;flex-direction:column;align-items:center;gap:.9rem;}

/* Stacked combo */
.combo-stack{position:relative;cursor:pointer;width:clamp(120px,26vw,190px);aspect-ratio:2/3;filter:drop-shadow(0 12px 32px rgba(0,0,0,.6));}
.combo-shadow{position:absolute;top:-7px;left:7px;width:100%;height:100%;border-radius:10px;background:linear-gradient(160deg,var(--sand) 0%,#a07828 100%);border:1px solid rgba(255,255,255,.15);}
.combo-front{position:absolute;inset:0;border-radius:10px;background:linear-gradient(160deg,var(--navy2) 0%,var(--navy) 100%);border:1px solid rgba(200,169,110,.3);display:flex;align-items:center;justify-content:center;overflow:hidden;transition:transform .25s,box-shadow .25s;}
.combo-front:hover{transform:scale(1.04);box-shadow:0 16px 48px rgba(0,0,0,.6);}
.combo-front-inner{width:70%;height:76%;border:1px solid rgba(200,169,110,.2);border-radius:5px;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:.4rem;background:repeating-linear-gradient(45deg,transparent,transparent 5px,rgba(200,169,110,.04) 5px,rgba(200,169,110,.05) 6px);}
.combo-glyph{font-size:1.4rem;color:rgba(200,169,110,.35);font-family:'Cormorant Garamond',serif;}
.combo-hint{font-size:.62rem;color:rgba(200,169,110,.55);letter-spacing:.18em;font-family:'Cormorant Garamond',serif;font-style:italic;}

@keyframes comboReveal{0%{transform:scale(1) rotateY(0);}35%{transform:scale(1.07) rotateY(0) translateY(-14px);}100%{transform:scale(1) rotateY(0);}}
.combo-stack.popping{animation:comboReveal .55s cubic-bezier(.34,1.4,.64,1) forwards;}

/* Result card */
.result-card{display:none;position:relative;background:var(--white);border-radius:12px;padding:38px 30px 32px;box-shadow:0 20px 60px rgba(0,0,0,.55),0 0 0 1px rgba(200,169,110,.2);}
.result-card.show{display:block;animation:riseIn .5s cubic-bezier(.34,1.4,.64,1);}
@keyframes riseIn{from{transform:scale(.88) translateY(20px);opacity:0;}to{transform:scale(1) translateY(0);opacity:1;}}
.rc-w{position:absolute;font-family:'Noto Serif TC',serif;font-size:clamp(.8rem,2vw,1.1rem);color:var(--ink);letter-spacing:.1em;}
.rc-w.t{top:9px;left:50%;transform:translateX(-50%);white-space:nowrap;}
.rc-w.b{bottom:8px;left:50%;transform:translateX(-50%);white-space:nowrap;}
.rc-w.l{left:8px;top:50%;transform:translateY(-50%);writing-mode:vertical-rl;}
.rc-w.r{right:8px;top:50%;transform:translateY(-50%) rotate(180deg);writing-mode:vertical-rl;}
.rc-img-wrap{border-radius:5px;overflow:hidden;border:3px solid var(--red);width:clamp(130px,28vw,210px);aspect-ratio:2/3;box-shadow:0 4px 16px rgba(0,0,0,.2);}
.rc-img-wrap img{width:100%;height:100%;object-fit:contain;display:block;background:var(--white);}

/* Action panel */
.action-panel{background:rgba(238,242,247,.97);border-radius:10px;padding:.85rem 1.2rem;display:flex;flex-direction:column;align-items:center;gap:.55rem;min-width:260px;max-width:340px;box-shadow:0 8px 28px rgba(0,0,0,.25);border:1px solid rgba(27,58,92,.1);}
.action-q{font-size:.72rem;color:var(--muted);letter-spacing:.12em;}
.action-row{display:flex;gap:.45rem;flex-wrap:wrap;justify-content:center;}

/* lightbox */
.lightbox{display:none;position:fixed;inset:0;z-index:500;background:rgba(10,18,30,.92);backdrop-filter:blur(8px);align-items:center;justify-content:center;cursor:zoom-out;}
.lightbox.show{display:flex;}
.lightbox-inner{position:relative;max-width:90vw;max-height:90vh;background:var(--white);border-radius:14px;padding:36px 28px 30px;box-shadow:0 24px 64px rgba(0,0,0,.6);cursor:default;animation:riseIn .4s cubic-bezier(.34,1.4,.64,1);}
.lb-w{position:absolute;font-family:'Noto Serif TC',serif;font-size:clamp(.9rem,2.5vw,1.2rem);color:var(--ink);letter-spacing:.1em;}
.lb-w.t{top:9px;left:50%;transform:translateX(-50%);white-space:nowrap;}
.lb-w.b{bottom:8px;left:50%;transform:translateX(-50%);white-space:nowrap;}
.lb-w.l{left:8px;top:50%;transform:translateY(-50%);writing-mode:vertical-rl;}
.lb-w.r{right:8px;top:50%;transform:translateY(-50%) rotate(180deg);writing-mode:vertical-rl;}
.lb-img{border-radius:6px;overflow:hidden;border:3px solid var(--red);width:min(60vw,300px);aspect-ratio:2/3;}
.lb-img img{width:100%;height:100%;object-fit:contain;display:block;background:var(--white);}
.lb-close{position:absolute;top:8px;right:12px;background:none;border:none;font-size:1.2rem;color:var(--muted);cursor:pointer;line-height:1;}
.result-group{cursor:zoom-in;}
@media(max-width:480px){.top-bar{padding:.5rem .8rem;}.result-card{padding:30px 20px 26px;}}
</style>
</head>
<body>

<div class="top-bar">
  <div class="top-title">Oh Card</div>
  <div class="top-right">
    <div class="pill" id="statusPill">請輸入問題或直接抽牌</div>
    <button class="btn btn-outline" id="resetBtn" onclick="doReset()">↺ 重新洗牌</button>
  </div>
</div>

<!-- Question input -->
<div class="q-screen" id="qScreen">
  <div class="q-card">
    <div class="q-label">在抽牌前，你可以先寫下你的問題</div>
    <div class="q-row">
      <span class="q-prefix">Q ：</span>
      <input class="q-input" id="qInput" type="text" placeholder="輸入你的問題（可略過）" maxlength="80">
    </div>
    <div class="q-actions">
      <button class="btn btn-outline" onclick="startDraw()">直接抽牌</button>
      <button class="btn btn-gold" onclick="startDraw()">確認，開始抽牌</button>
    </div>
  </div>
</div>

<!-- Results area (above fan) -->
<div class="results-area" id="resultsArea">
  <div class="results-title" id="resultsTitle"></div>
  <div class="results-scroll" id="resultsScroll"></div>
</div>
<div class="dl-all-wrap" id="dlAllWrap" style="display:none;">
  <button class="btn btn-gold" onclick="downloadAll()">⬇ 下載本次結果</button>
</div>

<!-- Fan area (hidden until started) -->
<div id="fanArea" style="display:none;">
  <div class="section-label img-lbl" id="imgLabel">圖 卡</div>
  <div class="fan-wrap"><div class="fan-container" id="imgFan"></div></div>
  <div class="deck-divider"><div class="div-line"></div><div class="div-orn">· · ·</div><div class="div-line"></div></div>
  <div class="section-label word-lbl" id="wordLabel">字 卡</div>
  <div class="fan-wrap"><div class="fan-container" id="wordFan"></div></div>
  <div style="height:1.5rem"></div>
</div>

<!-- Overlay -->
<div class="overlay" id="overlay">
  <div class="overlay-bg"></div>
  <div class="ov-content">
    <div id="comboWrap">
      <div class="combo-stack" id="theCombo" onclick="flipCombo()">
        <div class="combo-shadow"></div>
        <div class="combo-front">
          <div class="combo-front-inner">
            <div class="combo-glyph">✦</div>
            <div class="combo-hint">點我翻開</div>
          </div>
        </div>
      </div>
    </div>
    <div class="result-card" id="resultCard">
      <div class="rc-w t" id="rcTop"></div>
      <div class="rc-w l" id="rcLeft"></div>
      <div class="rc-img-wrap"><img id="rcImg" src="" alt=""></div>
      <div class="rc-w r" id="rcRight"></div>
      <div class="rc-w b" id="rcBottom"></div>
    </div>
    <div class="action-panel" id="actionPanel" style="display:none;">
      <div class="action-q" id="actionQ">繼續抽下一組？</div>
      <div class="action-row">
        <button class="btn btn-outline" onclick="doFinish()">結束</button>
        <button class="btn btn-outline" onclick="doReset()">重新洗牌</button>
        <button class="btn btn-navy" onclick="doContinue()">繼續抽</button>
      </div>
    </div>
  </div>
</div>

// 88 words + 2 blank = 90 word cards
const WORDS=[

  '誇贊','女人','應該','歡笑','母親','姿態','權利遊戲','希望','專家','罪惡感',

  '付出','吸引','退歉','詼諧','成功','腐朽','外表','敵對','醜陋','生氣',
  '失敗','虧欠','丟臉','固執','尷尬','躲藏','等候','習慣','聰明','羞辱',
  '謊言','陌生人','喜悅','恐懼','弄巧成拙','奴隸','堅定','攫取','猶豫','愚蠢',

  '', '',  // 2 blank cards
];

function imgUrl(id){return`https://lh3.googleusercontent.com/d/${id}`;}
function shuffle(a){const b=[...a];for(let i=b.length-1;i>0;i--){const j=0|Math.random()*(i+1);[b[i],b[j]]=[b[j],b[i]];}return b;}
function today(){const d=new Date();return`${d.getFullYear()}/${String(d.getMonth()+1).padStart(2,'0')}/${String(d.getDate()).padStart(2,'0')}`;}

const GLYPHS=['✦','✧','◈','☽','⊹','✴','⋆','◇'];
let imgPool=[],wordPool=[];
let selImgPos=null,selWordPos=null,lastImgIdx=null,lastWordIdx=null;
let drawnGroups=[]; // {imgIdx, wordIdx, word}
let currentQuestion='';
let roundCount=0;

// ── BUILD FAN ──
function buildFan(cid,pool,type){
  const c=document.getElementById(cid);
  c.innerHTML='';
  const n=pool.length;
  if(!n){
    c.style.width='100%'; c.style.height='70px';
    c.style.display='flex'; c.style.alignItems='center'; c.style.justifyContent='center';
    c.innerHTML='<div style="color:#6b8299;font-size:12px;">牌已用完</div>';
    return;
  }

  const vw = window.innerWidth;
  const isMobile = vw < 600;
  const maxW = vw - 20;

  // Card size
  const cw = Math.max(14, Math.min(isMobile ? 30 : 44, Math.floor(maxW * 0.055)));
  const ch = Math.round(cw * 1.5);

  // Fan spread: cards overlap in centre, spread at edges
  // Total fan width = 70% of screen, centred
  const fanW = maxW * 0.72;
  const step = fanW / (n - 1 || 1);  // x-step between cards

  // Parabola lift: centre cards highest
  const maxLift = isMobile ? 20 : 32;
  const maxTilt = isMobile ? 10 : 15;  // max rotation at edges (degrees)

  // Container: fanW + cw padding on each side for edges
  const cW = maxW;
  const cH = ch + maxLift + 10;
  const startX = (cW - fanW - cw) / 2;  // left margin so fan is centred

  c.style.width    = cW + 'px';
  c.style.height   = cH + 'px';
  c.style.position = 'relative';
  c.style.overflow = 'visible';

  for(let i = 0; i < n; i++){
    const t = n === 1 ? 0 : (i / (n-1)) * 2 - 1;  // -1..+1

    const x = startX + i * step;
    const lift = maxLift * (1 - t * t);
    const y = (cH - ch) - lift;
    const tilt = t * maxTilt;
    const zi = Math.round(50 - Math.abs(t) * 25);

    const card = document.createElement('div');
    card.className = 'fan-card';
    card.style.position      = 'absolute';
    card.style.width         = cw + 'px';
    card.style.height        = ch + 'px';
    card.style.left          = Math.round(x) + 'px';
    card.style.top           = Math.round(y) + 'px';
    card.style.transform     = 'rotate(' + tilt.toFixed(1) + 'deg)';
    card.style.setProperty('--bt', 'rotate(' + tilt.toFixed(1) + 'deg)');
    card.style.zIndex        = zi;
    card.style.transformOrigin = 'bottom center';
    card.style.cursor        = 'pointer';

    const di   = pool[i];
    const src  = type === 'img'  ? imgUrl(IMAGE_IDS[di]) : '';
    const word = type === 'word' ? (WORDS[di] || '') : '';
    const g    = GLYPHS[i % GLYPHS.length];
    const bk   = type === 'img' ? 'img-back'       : 'word-back';
    const bki  = type === 'img' ? 'img-back-inner'  : 'word-back-inner';

    card.innerHTML =
      '<div class="card-inner">' +
        '<div class="card-face ' + bk + '">' +
          '<div class="' + bki + '">' +
            '<span class="back-glyph">' + g + '</span>' +
          '</div>' +
        '</div>' +
        '<div class="card-face card-front' + (type==='word' ? ' word-face' : '') + '">' +
          (type === 'img'
            ? '<img src="' + src + '" alt="">'
            : '<div style="width:100%;height:100%;display:flex;align-items:center;justify-content:center;">' +
                '<span class="word-glyph">' + word + '</span>' +
              '</div>') +
        '</div>' +
      '</div>';

    card.addEventListener('click', (function(card,i,type,di){
      return function(){ onPick(card,i,type,di); };
    })(card,i,type,di));
    c.appendChild(card);
  }
}

function onPick(card,pos,type,di){
  if(card.classList.contains('disabled')||card.classList.contains('flipped')||card.classList.contains('flipping'))return;
  if(type==='img'&&selImgPos!==null)return;
  if(type==='word'&&selWordPos!==null)return;
  card.classList.add('flipping');
  setTimeout(()=>{card.classList.remove('flipping');card.classList.add('flipped');},700);
  if(type==='img'){
    selImgPos=pos;lastImgIdx=di;
    document.querySelectorAll('#imgFan .fan-card').forEach(c=>{if(c!==card)c.classList.add('disabled');});
    document.getElementById('imgLabel').innerHTML='圖 卡 <span class="badge" style="color:var(--teal)">✓</span>';
  } else {
    selWordPos=pos;lastWordIdx=di;
    document.querySelectorAll('#wordFan .fan-card').forEach(c=>{if(c!==card)c.classList.add('disabled');});
    document.getElementById('wordLabel').innerHTML='字 卡 <span class="badge" style="color:var(--sand)">✓</span>';
  }
  updateUI();
  // Auto show combo when both selected
  if(selImgPos!==null&&selWordPos!==null){
    setTimeout(showCombo,500);
  }
}

function updateUI(){
  const hi=selImgPos!==null,hw=selWordPos!==null;
  document.getElementById('statusPill').textContent=
    hi&&hw?'已選好，即將翻開…':hi?'再選一張字卡':hw?'再選一張圖卡':'請各選一張牌';
}

// ── SHOW COMBO ──
function showCombo(){
  document.getElementById('rcImg').src=imgUrl(IMAGE_IDS[lastImgIdx]);
  const w=WORDS[lastWordIdx];
  ['rcTop','rcBottom','rcLeft','rcRight'].forEach(id=>document.getElementById(id).textContent=w);
  document.getElementById('comboWrap').style.display='block';
  document.getElementById('resultCard').classList.remove('show');
  document.getElementById('actionPanel').style.display='none';
  document.getElementById('theCombo').classList.remove('popping');
  document.getElementById('overlay').classList.add('show');
}

function flipCombo(){
  const combo=document.getElementById('theCombo');
  combo.classList.add('popping');
  setTimeout(()=>{
    document.getElementById('comboWrap').style.display='none';
    document.getElementById('resultCard').classList.add('show');
    // Save to drawn groups
    roundCount++;
    drawnGroups.push({imgIdx:lastImgIdx,wordIdx:lastWordIdx,word:WORDS[lastWordIdx],round:roundCount});
    renderResultsArea();
    document.getElementById('actionPanel').style.display='flex';
    document.getElementById('actionQ').textContent=`第 ${roundCount} 組完成，繼續？`;
  },550);
}

// ── RESULTS AREA ──
function renderResultsArea(){
  const area=document.getElementById('resultsArea');
  const scroll=document.getElementById('resultsScroll');
  const title=document.getElementById('resultsTitle');
  if(!drawnGroups.length){area.classList.remove('has-cards');document.getElementById('dlAllWrap').style.display='none';return;}
  area.classList.add('has-cards');
  document.getElementById('dlAllWrap').style.display='block';
  const q=currentQuestion?`Q：${currentQuestion}　`:'';
  title.textContent=`${q}${today()}`;
  scroll.innerHTML='';
  drawnGroups.forEach((g,i)=>{
    const div=document.createElement('div');
    div.className='result-group';
    div.onclick=()=>openLightbox(g);
    div.innerHTML=`<div class="rg-num">第 ${i+1} 組</div>
      <div class="rg-combo">
        <div class="rg-w t">${g.word}</div>
        <div class="rg-w l">${g.word}</div>
        <div class="rg-img"><img src="${imgUrl(IMAGE_IDS[g.imgIdx])}" crossorigin="anonymous" style="mix-blend-mode:multiply;"></div>
        <div class="rg-w r">${g.word}</div>
        <div class="rg-w b">${g.word}</div>
      </div>`;
    scroll.appendChild(div);
  });
}

// ── ACTIONS ──
function doFinish(){
  document.getElementById('overlay').classList.remove('show');
  downloadAll();
}

function doContinue(){
  document.getElementById('overlay').classList.remove('show');
  // Remove used cards
  imgPool=imgPool.filter((_,i)=>i!==selImgPos);
  wordPool=wordPool.filter((_,i)=>i!==selWordPos);
  selImgPos=null;selWordPos=null;lastImgIdx=null;lastWordIdx=null;
  imgPool=shuffle(imgPool);wordPool=shuffle(wordPool);
  document.getElementById('imgLabel').innerHTML='圖 卡';
  document.getElementById('wordLabel').innerHTML='字 卡';
  buildFan('imgFan',imgPool,'img');
  buildFan('wordFan',wordPool,'word');
  updateUI();
}

function doReset(){
  document.getElementById('overlay').classList.remove('show');
  drawnGroups=[];roundCount=0;
  selImgPos=null;selWordPos=null;lastImgIdx=null;lastWordIdx=null;
  renderResultsArea();
  // Shuffle animation
  animateShuffle(()=>{
    imgPool=shuffle([...Array(88).keys()]);
    wordPool=shuffle([...Array(90).keys()]);
    document.getElementById('imgLabel').innerHTML='圖 卡';
    document.getElementById('wordLabel').innerHTML='字 卡';
    buildFan('imgFan',imgPool,'img');
    buildFan('wordFan',wordPool,'word');
    updateUI();
  });
}

function animateShuffle(cb){
  const fans=['imgFan','wordFan'];
  fans.forEach(fid=>{
    const cards=[...document.querySelectorAll(`#${fid} .fan-card`)];
    cards.forEach((c,i)=>{
      c.classList.add(i%2===0?'shuffling-l':'shuffling-r');
      c.addEventListener('animationend',()=>c.classList.remove('shuffling-l','shuffling-r'),{once:true});
    });
  });
  setTimeout(cb,550);
}

// ── DOWNLOAD ──
function downloadAll(){
  if(!drawnGroups.length)return;
  // Build canvas
  const canvas=document.createElement('canvas');
  const cols=drawnGroups.length;
  const cardW=160,cardH=240,pad=24,topH=80,gap=20;
  canvas.width=pad*2+cols*(cardW+gap)-gap;
  canvas.height=topH+cardH+pad*2;
  const ctx=canvas.getContext('2d');

  // Background
  ctx.fillStyle='#eef2f7';
  ctx.fillRect(0,0,canvas.width,canvas.height);

  // Header
  ctx.fillStyle='#1b3a5c';
  ctx.fillRect(0,0,canvas.width,topH);
  ctx.fillStyle='#e8d5a8';
  ctx.font='italic 18px Georgia,serif';
  ctx.textAlign='left';
  const q=currentQuestion?`Q：${currentQuestion}`:'Oh Card';
  ctx.fillText(q,pad,32);
  ctx.font='13px serif';
  ctx.fillStyle='#c8a96e';
  ctx.fillText(today(),pad,56);

  // Draw each group
  const drawGroup=(g,idx,resolve)=>{
    const x=pad+idx*(cardW+gap);
    const y=topH+pad;
    // Word frame
    ctx.fillStyle='#ffffff';
    ctx.strokeStyle='#c8a96e';
    ctx.lineWidth=1.5;
    roundRect(ctx,x,y,cardW,cardH,8);
    ctx.fill();ctx.stroke();
    // Word text
    ctx.fillStyle='#1a2530';
    ctx.font='14px Noto Serif TC,serif';
    ctx.textAlign='center';
    const w=g.word||'';
    ctx.fillText(w,x+cardW/2,y+16);
    ctx.fillText(w,x+cardW/2,y+cardH-6);
    ctx.save();ctx.translate(x+12,y+cardH/2);ctx.rotate(-Math.PI/2);ctx.fillText(w,0,0);ctx.restore();
    ctx.save();ctx.translate(x+cardW-12,y+cardH/2);ctx.rotate(Math.PI/2);ctx.fillText(w,0,0);ctx.restore();
    // Image
    const img=new Image();img.crossOrigin='anonymous';
    img.onload=()=>{
      const ix=x+20,iy=y+22,iw=cardW-40,ih=cardH-44;
      ctx.save();
      roundRect(ctx,ix,iy,iw,ih,4);ctx.clip();
      ctx.drawImage(img,ix,iy,iw,ih);
      ctx.restore();
      // Red border
      ctx.strokeStyle='#b83030';ctx.lineWidth=2.5;
      roundRect(ctx,ix,iy,iw,ih,4);ctx.stroke();
      resolve();
    };
    img.onerror=()=>resolve();
    img.src=imgUrl(IMAGE_IDS[g.imgIdx]);
  };

  const promises=drawnGroups.map((g,i)=>new Promise(res=>drawGroup(g,i,res)));
  Promise.all(promises).then(()=>{
    const a=document.createElement('a');
    a.download=`ohcard_${today().replace(/\//g,'-')}.png`;
    a.href=canvas.toDataURL('image/png');
    a.click();
  });
}

function roundRect(ctx,x,y,w,h,r){
  ctx.beginPath();ctx.moveTo(x+r,y);ctx.lineTo(x+w-r,y);ctx.arcTo(x+w,y,x+w,y+r,r);
  ctx.lineTo(x+w,y+h-r);ctx.arcTo(x+w,y+h,x+w-r,y+h,r);ctx.lineTo(x+r,y+h);
  ctx.arcTo(x,y+h,x,y+h-r,r);ctx.lineTo(x,y+r);ctx.arcTo(x,y,x+r,y,r);ctx.closePath();
}

// ── START ──
function startDraw(){
  currentQuestion=document.getElementById('qInput').value.trim();
  document.getElementById('qScreen').style.display='none';
  document.getElementById('fanArea').style.display='block';
  imgPool=shuffle([...Array(88).keys()]);
  wordPool=shuffle([...Array(90).keys()]);
  buildFan('imgFan',imgPool,'img');
  buildFan('wordFan',wordPool,'word');
  updateUI();
}

function openLightbox(g){
  const w=g.word||'';
  document.getElementById('lbTop').textContent=w;
  document.getElementById('lbBottom').textContent=w;
  document.getElementById('lbLeft').textContent=w;
  document.getElementById('lbRight').textContent=w;
  document.getElementById('lbImg').src=imgUrl(IMAGE_IDS[g.imgIdx]);
  document.getElementById('lightbox').classList.add('show');
}
function closeLightbox(e){
  if(e&&document.getElementById('lbInner').contains(e.target)&&e.target!==document.getElementById('lightbox'))return;
  document.getElementById('lightbox').classList.remove('show');
}

window.addEventListener('resize',()=>{
  if(document.getElementById('fanArea').style.display!=='none'){
    buildFan('imgFan',imgPool,'img');
    buildFan('wordFan',wordPool,'word');
  }
});
